name: CI

# Enforces the build + verify gate that was previously "local only".
# Runs `npm test` (= npm run build && npm run verify):
#   - Style Dictionary build produces all six dist/ outputs
#   - verify-build.mjs checks each exists & is non-empty
#   - the consumer contract (site var(--kr-…) ↔ dist) runs when the site
#     repo is present; on this pipeline-only checkout it is skipped with a
#     warning (see verify-build.mjs). To enforce the contract too, run it
#     from the site repo's CI against the pinned tokens.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: build + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build + verify
        run: npm test
